<div class="loading" [attr.aria-label]="label()">
  @for (row of rowArray(); track $index) {
  <div class="loading__row">
    <div class="skeleton loading__cell loading__cell--sm"></div>
    <div class="skeleton loading__cell loading__cell--lg"></div>
    <div class="skeleton loading__cell loading__cell--md"></div>
    <div class="skeleton loading__cell loading__cell--md"></div>
    <div class="skeleton loading__cell loading__cell--sm"></div>
  </div>
  }
</div>
